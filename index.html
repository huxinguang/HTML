<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iOS 上传测试</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 24px; }
    .box { max-width: 520px; margin: 0 auto; }
    input { font-size: 16px; margin: 12px 0; display: block; }
    pre { background: #f5f5f5; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="box">
    <h2>iOS 网页上传测试</h2>

    <p>普通文件上传</p>
    <input id="fileInput" type="file" />

    <p>图片/拍照上传</p>
    <input id="imageInput" type="file" accept="image/*" capture="environment" />

    <p>多文件上传</p>
    <input id="multiInput" type="file" multiple />

    <pre id="result">尚未选择文件</pre>
  </div>

  <script>
    function bindInput(id) {
      const input = document.getElementById(id);
      const result = document.getElementById('result');
      input.addEventListener('change', () => {
        const files = Array.from(input.files || []);
        if (!files.length) {
          result.textContent = '未选择文件';
          return;
        }
        result.textContent = files.map((f, i) =>
          `${i + 1}. 名称: ${f.name}\n类型: ${f.type || '未知'}\n大小: ${f.size} bytes`
        ).join('\n\n');
      });
    }
    bindInput('fileInput');
    bindInput('imageInput');
    bindInput('multiInput');
  </script>
</body>
</html>
